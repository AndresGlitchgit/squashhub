<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Squash racket silhouette -->
  <ellipse cx="256" cy="200" rx="100" ry="120" fill="none" stroke="#fff" stroke-width="16" opacity="0.9"/>
  <!-- Racket strings horizontal -->
  <line x1="170" y1="170" x2="342" y2="170" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="162" y1="200" x2="350" y2="200" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="170" y1="230" x2="342" y2="230" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <!-- Racket strings vertical -->
  <line x1="220" y1="85" x2="220" y2="315" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="256" y1="80" x2="256" y2="320" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <line x1="292" y1="85" x2="292" y2="315" stroke="#fff" stroke-width="4" opacity="0.5"/>
  <!-- Racket handle -->
  <rect x="244" y="310" width="24" height="100" rx="8" fill="#fff" opacity="0.9"/>
  <rect x="236" y="400" width="40" height="20" rx="6" fill="#fff" opacity="0.7"/>
  <!-- Squash ball (black with colored dot) -->
  <circle cx="370" cy="140" r="30" fill="#1a1a1a"/>
  <circle cx="370" cy="140" r="28" fill="none" stroke="#333" stroke-width="1.5" opacity="0.6"/>
  <circle cx="362" cy="132" r="5" fill="#FFD700"/>
</svg>
